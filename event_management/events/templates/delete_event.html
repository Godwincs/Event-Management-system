{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="booking-card-premium text-center">

        <h2>

            🗑 Delete Event

        </h2>

        <p>

            Are you sure you want to delete:

            <strong>

                {{ event.title }}

            </strong>

            ?

        </p>

        <form method="POST">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger">

                Delete Event

            </button>

            <a href="{% url 'event_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
